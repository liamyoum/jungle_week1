            <div class="flex justify-between items-center p-4 bg-gray-50/50 border-t border-gray-100">

                </button>
                <button id="next-page" class="flex items-center gap-1 text-gray-500 hover:text-green-600 disabled:opacity-30 disabled:cursor-not-allowed transition">
                다음
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>

    <script>
        //나중에 nick이랑 총공부시간 서버에서 받아와야됨. 여기도 jinja써야 되겠다. 뚫어놔야겠네//
        
        const itemsPerPage = 10;
        let currentPage = 1;

        function renderTable() {
            const totalPages = Math.ceil(allFreinds.length / itemsPerPage);
            const startIndex = (currentPage -1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const currentData = allFreinds.slice(startIndex, endIndex);

            let friendRows = ''
            currentData.forEach(user => {
                html += `
                    <tr class="hover:bg-green-50/50 transition h-14"> 
                        <td class="px-6 py-4 font-semibold text-gray-800">${user.name}</td>
                        <td class="px-6 py-4 font-mono text-green-600 text-right">${user.total_time}</td>
                     </tr>
                `;
            });

            $('friend-list-tbody').html(friendRows);

            $('#page-indicator').text(`${currentPage} / ${totalPages}`);
            $('#prev-page').prop('disabled', currentPage === 1);
            $('#nest-page').prop('disabled', currentPage === totalPages);

            $('.overflow-y-auto').scrollTop(0);
        }

        $('#prev-page').click(function() {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        });


        $('#next-page').click(function() {
            const totalPages = Math.ceil(allFreinds.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderTable();
            }
        });
        renderTable();
    </script>
