{% extends "base.html" %} {% block content %}
<nav class="fixed top-0 left-0 w-full bg-green-600/70 backdrop-blur-md shadow-sm z-50 transition-all">
	<div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
		<div class="font-bold text-3xl text-white tracking-tighter cursor-pointer">정품타</div>
		<div class="flex gap-6 text-white/80 font-medium text-md items-center">
			<a href="/" class="hover:text-white">홈</a>
			<a href="/realTimeUser" class="hover:text-white font-bold text-white">실시간 접속자</a>
			<a href="/friends" class="hover:text-white">친구</a>
			<a href="/myPage" class="hover:text-white">마이페이지</a>
			<a href="/logout" onclick="return confirm('정말 로그아웃 하시겠습니까?');" class="bg-white/20 px-4 py-1.5 rounded-full cursor-pointer hover:bg-white/30 transition">로그아웃</a>
		</div>
	</div>
</nav>

<main class="max-w-4xl mx-auto pt-32 pb-24 px-4">
	<section class="bg-white/95 backdrop-blur-sm rounded-3xl shadow-xl overflow-hidden border border-white/20">
		<div class="p-8 text-center border-b border-gray-100 bg-green-50/50">
			<h2 class="text-4xl font-black text-gray-800 tracking-tight">실시간 접속자</h2>
		</div>
		<div class="p-8 space-y-10">
			<div class="pt-2">
				<h3 class="text-sm font-bold text-gray-500 mb-3 flex items-center gap-2">
					<span class="relative flex h-2 w-2">
						<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
						<span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
					</span>
					실시간 접속 유저
				</h3>
				<div id="user-list" class="space-y-2 max-h-48 overflow-y-auto pr-2 scrollbar-thin scrollbar-thumb-gray-200 scrollbar-track-transparent">
					<p class="text-xs text-gray-400 text-center py-4">접속 중인 유저를 불러오는 중...</p>
				</div>
			</div>
		</div>
	</section>
</main>

<script>
	function updateUsers(userList) {
		const $container = $('#user-list');
		$container.empty(); 
        
        if (userList.length === 0) {
            $container.append('<p class="text-xs text-gray-400 text-center py-4">현재 공부 중인 유저가 없습니다.</p>');
            return;
        }

		userList.forEach((user) => {
			const userRow = `
                <div class="flex items-center justify-between bg-gray-50 px-4 py-3 rounded-xl border border-gray-100 hover:border-green-200 hover:bg-white transition-all shadow-sm">
                    <div class="flex items-center gap-3">
                        <span class="text-sm font-bold text-gray-700">${user.nickname}</span>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                        <span class="text-[10px] font-bold text-green-600">ONLINE</span>
                    </div>
                </div>`;
			$container.append(userRow);
		});
	}

    $(document).ready(function() {
        $.ajax({
            type: "GET",
            url: "/memberlist?sortMode=Now",
            success: function(response) {
                if(response.result === 'success') {
                    updateUsers(response.memberlist);
                } else {
                    $('#user-list').html('<p class="text-xs text-red-400 text-center py-4">데이터를 불러오지 못했습니다.</p>');
                }
            }
        });
    });
</script>
{% endblock %}
