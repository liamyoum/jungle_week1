{% extends "base.html" %} {% block content %}
		<nav class="fixed top-0 left-0 w-full bg-green-600/70 backdrop-blur-md shadow-sm z-50 transition-all">
      <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
        <div class="font-bold text-3xl text-white tracking-tighter cursor-pointer">
          정품타
        </div>

        <div class="flex gap-6 text-white/80 font-medium text-md items-center">
          <a href="#" class="hover:text-white">리더보드</a>
          <a href="#" class="hover:text-white">실시간 접속자</a>
          <a href="#" class="hover:text-white">친구</a>
          <a href="#" class="hover:text-white">마이페이지</a>
          <button class="bg-white/20 px-4 py-1.5 rounded-full cursor-pointer hover:bg-white/30 transition">로그아웃</button>
        </div>
      </div>
    </nav>

    <main class="max-w-2xl mx-auto pt-32 pb-24 px-4">
        <section class="bg-white/95 backdrop-blur-sm rounded-3xl shadow-xl overflow-hidden border border-white/20">
            <div class="p-8 text-center border-b border-gray-100 bg-green-50/50">
                <h2 id="nickname" class="text-4xl font-black text-gray-800 tracking-tight">
                    <span class="text-gray-400 font-normal text-lg"></span> "{{ profile_inf.nickname }}"
                </h2>
            </div>

            <div class="p-8 space-y-10">
                <div class="space-y-3">
                    <!-- 여기에 프로그래스바 로직 들어가야됨 + 서버에서 시작+종료 시간들 받아와야됨-->
                    <div class="flex justify-between items-end">
                        <span class="text-sm font-bold text-gray-500">오늘의 진행상태</span>
                    </div>
                    <div class="w-full h-4 bg-gray-200 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-gradient-to-r from-green-400 to-green-600 rounded-full shadow-inner transition-all duration-1000" style="width: 75%;"></div>
                    </div>
                </div>
                <div class="pt-6 border-t border-gray-100">
                    <h3
                        class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"
                    >
                        응원 한마디
                        <span class="text-sm font-normal text-gray-400">(3)</span>
                    </h3>

                    <div id="comment-list" class="space-y-4 mb-6 max-h-60 overflow-y-auto pr-2">
                        {% for item in replys %}
                        <div class="bg-gray-50 p-4 rounded-xl text-sm flex justify-between items-start group">
                            <div>
                                <span class="font-bold text-green-700">{{ item.id }}</span>: {{ item.reply }}
                            </div>
                            {% if item.id == session['user_id'] %} 
                            <button onclick="deleteReply('{{ item.id }}')" class="text-xs text-red-400 opacity-0 group-hover:opacity-100 transition">삭제</button>
                            {% endif %}
                        </div>
                        {% endfor %}
                    </div>

                    <div
                        class="flex gap-2 bg-gray-100 p-2 rounded-2xl focus-within:ring-2 focus-within:ring-green-500 transition-all"
                    >
                        <input
                            type="text"
                            id="comment-input"
                            placeholder="댓글을 입력하세요..."
                            class="flex-1 bg-transparent border-none outline-none px-3 text-sm"
                        />
                        <button
                            id="submit-comment"
                            class="bg-green-600 text-white px-5 py-2 rounded-xl text-sm font-bold hover:bg-green-700 transition cursor-pointer"
                        >
                            등록
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        $(document).ready(function () {
            $('#submit-comment').click(function () {
                const text = $('#comment-input').val();
                const person = "{{ profile_inf.std_id }}"; 

                if (text) {
                    $.ajax({
                        type: "POST",
                        url: "/profile", // URL은 깔끔하게 유지
                        data: {
                            // 백엔드 친구가 request.form.get('replytext')로 받을 이름들
                            replytext: text,
                            person: person
                        },
                        success: function (response) {
                            if (response.result === 'success') {
                                // 화면에 즉시 추가하는 로직 (동일)
                                const newComment = `
                                    <div class="bg-gray-50 p-4 rounded-xl text-sm animate-fade-in">
                                        <span class="font-bold text-green-700">나</span>: ${text}
                                    </div>`;
                                
                                $('#comment-list').append(newComment);
                                $('#comment-input').val('');
                                $('#comment-list').scrollTop($('#comment-list')[0].scrollHeight);
                            } else {
                                alert(response.message || "오류가 발생했습니다.");
                            }
                        }
                    });
                }
            });
        });


    </script>
{% endblock %}
